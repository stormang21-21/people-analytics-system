<!DOCTYPE html>
<html>
<head>
    <title>Zones Test</title>
    <style>
        body { background: #0a0a0f; color: #fff; font-family: sans-serif; padding: 20px; }
        #container { position: relative; width: 640px; height: 480px; background: #333; border: 2px solid #4a9eff; }
        #video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; z-index: 1; }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: crosshair; }
        #info { margin-top: 10px; color: #4a9eff; }
    </style>
</head>
<body>
    <h1>Zone Drawing Test</h1>
    <div id="container">
        <img id="video" src="/video_feed" alt="Video">
        <canvas id="canvas"></canvas>
    </div>
    <div id="info">Click on the box above to draw</div>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const info = document.getElementById('info');
        
        // Set canvas size
        canvas.width = 640;
        canvas.height = 480;
        
        // Draw grid
        ctx.strokeStyle = '#555';
        ctx.lineWidth = 1;
        for (let x = 0; x < canvas.width; x += 50) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, canvas.height);
            ctx.stroke();
        }
        for (let y = 0; y < canvas.height; y += 50) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(canvas.width, y);
            ctx.stroke();
        }
        
        // Click handler
        canvas.onclick = function(e) {
            const rect = canvas.getBoundingClientRect();
            const x = Math.round(e.clientX - rect.left);
            const y = Math.round(e.clientY - rect.top);
            
            // Draw point
            ctx.fillStyle = '#4a9eff';
            ctx.beginPath();
            ctx.arc(x, y, 8, 0, Math.PI * 2);
            ctx.fill();
            
            // Draw coordinates
            ctx.fillStyle = '#fff';
            ctx.font = '14px sans-serif';
            ctx.fillText(x + ',' + y, x + 10, y);
            
            info.textContent = 'Clicked: ' + x + ', ' + y;
            console.log('Click:', x, y);
        };
        
        console.log('Canvas ready:', canvas.width, 'x', canvas.height);
    </script>
</body>
</html>
