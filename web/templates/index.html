<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Analytics System</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        .navbar {
            background: #1a1a24;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a3a;
        }
        
        .navbar h1 {
            color: #4a9eff;
            font-size: 1.5rem;
        }
        
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            font-size: 1.5rem;
            color: #4a9eff;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #4a9eff 0%, #2563eb 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .logo-text {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }
        
        .logo-main {
            font-size: 1.2rem;
            color: #4a9eff;
        }
        
        .logo-sub {
            font-size: 0.7rem;
            color: #707080;
            font-weight: normal;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }
        
        .nav-links a {
            color: #a0a0b0;
            text-decoration: none;
            transition: color 0.2s;
        }
        
        .nav-links a:hover, .nav-links a.active {
            color: #4a9eff;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }
        
        .video-panel {
            background: #1a1a24;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a2a3a;
        }
        
        .video-header {
            padding: 1rem;
            background: #252535;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        
        .video-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
        }
        
        .video-zoom-container {
            transform-origin: center center;
            transition: transform 0.2s ease;
        }
        
        .zoom-controls {
            display: inline-flex;
            gap: 5px;
            margin-left: 10px;
        }
        
        .zoom-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        
        .zoom-btn:hover {
            background: rgba(74, 158, 255, 0.8);
        }
        
        .zoom-level {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            display: inline-block;
            min-width: 45px;
            text-align: center;
        }

        .video-feed {
            object-fit: cover;
            background: #0a0a0f;
        }
        
        .video-controls {
            padding: 1rem;
            display: flex;
            gap: 1rem;
        }
        
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #4a9eff;
            color: white;
        }
        
        .btn-primary:hover {
            background: #3a8eef;
        }
        
        .btn-danger {
            background: #f87171;
            color: white;
        }
        
        .btn-danger:hover {
            background: #e06161;
        }
        
        .stats-panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .stat-card {
            background: #1a1a24;
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid #2a2a3a;
        }
        
        .stat-card h3 {
            color: #a0a0b0;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #4a9eff;
        }
        
        .zone-list {
            margin-top: 1rem;
        }
        
        .zone-item {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem;
            background: #252535;
            border-radius: 8px;
            margin-bottom: 0.5rem;
        }
        
        .zone-name {
            color: #e0e0e0;
        }
        
        .zone-count {
            background: #4a9eff;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.85rem;
        }
        
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .alert-panel {
            background: #1a1a24;
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid #2a2a3a;
            margin-top: 1rem;
        }
        
        .alert-item {
            padding: 0.75rem;
            background: #252535;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            border-left: 3px solid #f87171;
        }
        
        .alert-time {
            font-size: 0.8rem;
            color: #707080;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
                <div class="logo-icon">
                    <img src="/static/logo.jpg" onerror="this.style.display='none'; this.parentElement.innerHTML='📹';" style="width: 100%; height: 100%; object-fit: contain;">
                </div>
                <div class="logo-text">
                    <span class="logo-main">Video Analytics</span>
                    <span class="logo-sub">System</span>
                </div>
            </div>
        <div class="nav-links">
            <a href="/" class="active">Dashboard</a>
            <a href="/cameras">Cameras</a>
            <a href="/zones">Zones</a>
            <a href="/analytics">Analytics</a>
            <a href="/faces">Faces</a>
            <a href="/settings">Settings</a>
        </div>
    </nav>
    
    <div class="container">
        <div class="dashboard-grid">
            <div class="video-panel">
                <div class="video-header">
                    <span>Live Feed</span>
                    <span class="status-indicator">
                        <span class="status-dot"></span>
                        <span id="connection-status">Connected</span>
                    </span>
                </div>
                <div id="video-container" style="width: 100%; height: 480px; overflow: visible; display: flex; align-items: center; justify-content: center;">
                    <img src="/video_feed" class="video-feed" alt="Live video feed" style="width: 100%; height: 100%; object-fit: cover; transition: transform 0.2s;">
                </div>
                <div class="video-controls">
                    <button class="btn btn-primary" onclick="startSystem()">▶ Start</button>
                    <button class="btn btn-danger" onclick="stopSystem()">⏹ Stop</button>
                    <div class="zoom-controls">
                        <button class="zoom-btn" onclick="zoomOut()" title="Zoom Out">−</button>
                        <span class="zoom-level" id="zoom-level">100%</span>
                        <button class="zoom-btn" onclick="zoomIn()" title="Zoom In">+</button>
                        <button class="zoom-btn" onclick="resetZoom()" title="Reset">⟲</button>
                    </div>
                </div>
            </div>
            
            <div class="stats-panel">
                <div class="stat-card">
                    <h3>People Detected</h3>
                    <div class="stat-value" id="people-count">0</div>
                </div>
                
                <div class="stat-card">
                    <h3>Zone Occupancy</h3>
                    <div class="zone-list" id="zone-list">
                        <div class="zone-item">
                            <span class="zone-name">No zones configured</span>
                        </div>
                    </div>
                </div>
                
                <div class="stat-card">
                    <h3>Average Dwell Time</h3>
                    <div class="stat-value" id="avg-dwell">0s</div>
                </div>
            </div>
        </div>
        
        <div class="alert-panel">
            <h3 style="color: #a0a0b0; margin-bottom: 1rem;">Recent Alerts</h3>
            <div id="alerts">
                <div class="alert-item">
                    <div>System initialized</div>
                    <div class="alert-time">Just now</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const socket = io();
        
        socket.on('connect', function() {
            console.log('Connected to server');
            document.getElementById('connection-status').textContent = 'Connected';
        });
        
        // Fallback: poll analytics via API every 2 seconds
        setInterval(async function() {
            try {
                const response = await fetch('/api/analytics/current');
                const data = await response.json();
                if (data && data.avg_people_count !== undefined) {
                    document.getElementById('people-count').textContent = Math.round(data.avg_people_count);
                }
            } catch (e) {
                // Silent fail - WebSocket is primary
            }
        }, 2000);
        
        socket.on('disconnect', function() {
            console.log('Disconnected from server');
            document.getElementById('connection-status').textContent = 'Disconnected';
        });
        
        socket.on('analytics_update', function(data) {
            console.log('Analytics update:', data);
            document.getElementById('people-count').textContent = data.people_count || 0;
            
            // Update zone occupancy
            const zoneList = document.getElementById('zone-list');
            if (Object.keys(data.zone_occupancy).length > 0) {
                zoneList.innerHTML = '';
                for (const [zoneId, count] of Object.entries(data.zone_occupancy)) {
                    zoneList.innerHTML += `
                        <div class="zone-item">
                            <span class="zone-name">${zoneId}</span>
                            <span class="zone-count">${count}</span>
                        </div>
                    `;
                }
            }
        });
        
        function startSystem() {
            fetch('/api/start', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    console.log('System started:', data);
                    addAlert('System started');
                });
        }
        
        function stopSystem() {
            fetch('/api/stop', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    console.log('System stopped:', data);
                    addAlert('System stopped');
                });
        }
        
        function addAlert(message) {
            const alerts = document.getElementById('alerts');
            const time = new Date().toLocaleTimeString();
            alerts.innerHTML = `
                <div class="alert-item">
                    <div>${message}</div>
                    <div class="alert-time">${time}</div>
                </div>
            ` + alerts.innerHTML;
        }
        
        // Zoom functionality
        let currentZoom = 1.0;
        let minZoom = 0.5;
        let maxZoom = 3.0;
        let zoomStep = 0.25;
        
        function updateZoom() {
            console.log('Updating zoom to:', currentZoom);
            const videoFeed = document.querySelector('#video-container img');
            const zoomLevel = document.getElementById('zoom-level');
            console.log('Video element found:', !!videoFeed);
            if (videoFeed) {
                videoFeed.style.transform = `scale(${currentZoom})`;
                videoFeed.style.transformOrigin = 'center center';
                console.log('Transform applied');
            }
            if (zoomLevel) {
                zoomLevel.textContent = Math.round(currentZoom * 100) + '%';
            }
        }
        
        function zoomIn() {
            console.log('Zoom In clicked');
            if (currentZoom < maxZoom) {
                currentZoom += zoomStep;
                updateZoom();
            }
        }
        
        function zoomOut() {
            if (currentZoom > minZoom) {
                currentZoom -= zoomStep;
                updateZoom();
            }
        }
        
        function resetZoom() {
            currentZoom = 1.0;
            updateZoom();
        }
        
        // Mouse wheel zoom
        document.getElementById('video-container').addEventListener('wheel', function(e) {
            e.preventDefault();
            if (e.deltaY < 0) {
                zoomIn();
            } else {
                zoomOut();
            }
        }, { passive: false });
    </script>

</body>
</html>
