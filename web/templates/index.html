<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>People Analytics System</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        .navbar {
            background: #1a1a24;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a3a;
        }
        
        .navbar h1 {
            color: #4a9eff;
            font-size: 1.5rem;
        }
        
        .nav-links {
            display: flex;
            gap: 2rem;
        }
        
        .nav-links a {
            color: #a0a0b0;
            text-decoration: none;
            transition: color 0.2s;
        }
        
        .nav-links a:hover, .nav-links a.active {
            color: #4a9eff;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }
        
        .video-panel {
            background: #1a1a24;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a2a3a;
        }
        
        .video-header {
            padding: 1rem;
            background: #252535;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .video-feed {
            width: 100%;
            height: 480px;
            object-fit: cover;
            background: #0a0a0f;
        }
        
        .video-controls {
            padding: 1rem;
            display: flex;
            gap: 1rem;
        }
        
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #4a9eff;
            color: white;
        }
        
        .btn-primary:hover {
            background: #3a8eef;
        }
        
        .btn-danger {
            background: #f87171;
            color: white;
        }
        
        .btn-danger:hover {
            background: #e06161;
        }
        
        .stats-panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .stat-card {
            background: #1a1a24;
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid #2a2a3a;
        }
        
        .stat-card h3 {
            color: #a0a0b0;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #4a9eff;
        }
        
        .zone-list {
            margin-top: 1rem;
        }
        
        .zone-item {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem;
            background: #252535;
            border-radius: 8px;
            margin-bottom: 0.5rem;
        }
        
        .zone-name {
            color: #e0e0e0;
        }
        
        .zone-count {
            background: #4a9eff;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.85rem;
        }
        
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .alert-panel {
            background: #1a1a24;
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid #2a2a3a;
            margin-top: 1rem;
        }
        
        .alert-item {
            padding: 0.75rem;
            background: #252535;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            border-left: 3px solid #f87171;
        }
        
        .alert-time {
            font-size: 0.8rem;
            color: #707080;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1>🔍 People Analytics System</h1>
        <div class="nav-links">
            <a href="/" class="active">Dashboard</a>
            <a href="/cameras">Cameras</a>
            <a href="/zones">Zones</a>
            <a href="/analytics">Analytics</a>
            <a href="/settings">Settings</a>
        </div>
    </nav>
    
    <div class="container">
        <div class="dashboard-grid">
            <div class="video-panel">
                <div class="video-header">
                    <span>Live Feed</span>
                    <span class="status-indicator">
                        <span class="status-dot"></span>
                        <span id="connection-status">Connected</span>
                    </span>
                </div>
                <img src="/video_feed" class="video-feed" alt="Live video feed">
                <div class="video-controls">
                    <button class="btn btn-primary" onclick="startSystem()">▶ Start</button>
                    <button class="btn btn-danger" onclick="stopSystem()">⏹ Stop</button>
                </div>
            </div>
            
            <div class="stats-panel">
                <div class="stat-card">
                    <h3>People Detected</h3>
                    <div class="stat-value" id="people-count">0</div>
                </div>
                
                <div class="stat-card">
                    <h3>Zone Occupancy</h3>
                    <div class="zone-list" id="zone-list">
                        <div class="zone-item">
                            <span class="zone-name">No zones configured</span>
                        </div>
                    </div>
                </div>
                
                <div class="stat-card">
                    <h3>Average Dwell Time</h3>
                    <div class="stat-value" id="avg-dwell">0s</div>
                </div>
            </div>
        </div>
        
        <div class="alert-panel">
            <h3 style="color: #a0a0b0; margin-bottom: 1rem;">Recent Alerts</h3>
            <div id="alerts">
                <div class="alert-item">
                    <div>System initialized</div>
                    <div class="alert-time">Just now</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const socket = io();
        
        socket.on('connect', function() {
            console.log('Connected to server');
            document.getElementById('connection-status').textContent = 'Connected';
        });
        
        socket.on('disconnect', function() {
            console.log('Disconnected from server');
            document.getElementById('connection-status').textContent = 'Disconnected';
        });
        
        socket.on('analytics_update', function(data) {
            document.getElementById('people-count').textContent = data.people_count;
            
            // Update zone occupancy
            const zoneList = document.getElementById('zone-list');
            if (Object.keys(data.zone_occupancy).length > 0) {
                zoneList.innerHTML = '';
                for (const [zoneId, count] of Object.entries(data.zone_occupancy)) {
                    zoneList.innerHTML += `
                        <div class="zone-item">
                            <span class="zone-name">${zoneId}</span>
                            <span class="zone-count">${count}</span>
                        </div>
                    `;
                }
            }
        });
        
        function startSystem() {
            fetch('/api/start', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    console.log('System started:', data);
                    addAlert('System started');
                });
        }
        
        function stopSystem() {
            fetch('/api/stop', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    console.log('System stopped:', data);
                    addAlert('System stopped');
                });
        }
        
        function addAlert(message) {
            const alerts = document.getElementById('alerts');
            const time = new Date().toLocaleTimeString();
            alerts.innerHTML = `
                <div class="alert-item">
                    <div>${message}</div>
                    <div class="alert-time">${time}</div>
                </div>
            ` + alerts.innerHTML;
        }
    </script>
</body>
</html>
