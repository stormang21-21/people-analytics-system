<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="5" y="5" width="90" height="90" rx="15" fill="url(#grad1)"/>
  
  <!-- Camera body -->
  <rect x="20" y="35" width="50" height="35" rx="5" fill="#1a1a24"/>
  
  <!-- Camera lens -->
  <circle cx="45" cy="52.5" r="12" fill="#4a9eff"/>
  <circle cx="45" cy="52.5" r="8" fill="#1a1a24"/>
  <circle cx="45" cy="52.5" r="4" fill="#4a9eff"/>
  
  <!-- Recording dot -->
  <circle cx="75" cy="25" r="6" fill="#ff4444"/>
  
  <!-- Analytics lines -->
  <polyline points="25,75 35,65 45,70 55,60 65,65 75,55" 
            fill="none" stroke="#4a9eff" stroke-width="3" stroke-linecap="round"/>
</svg>
